<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ajax</title>
</head>

<body id='body'>

    <script type="module">
        import { ajax } from './Ajax.js'

        function add() {
            let body = document.getElementById('body')
            body.appendChild(document.createElement('p').appendChild(document.createTextNode('这个是在回调函数的回调函数中执行的')))

        }


        ajax('GET', 'http://jsonplaceholder.typicode.com/posts', function (i) {
            console.log(`我们拿到了外层成功的响应数据${i}`)
            ajax('GET', 'http://jsonplaceholder.typicode.com/posts', function (i) {
                add()
                console.log('----------------------------------接下来是内层的数据')
                console.log(`我们拿到了内层成功的响应数据${i}`)
            }, function (i) {
                console.log(i)
                console.log('内层出了问题')
            })
        }, function (i) {
            console.log(i)
            console.log('外层出了问题')
        })
    </script>

</body>

</html>
